  Q_20:
    prompt: >-
      In the snippet below, the interviewer is asking each patient to provide a 
      list of what they believe to be the greatest health concerns facing Canadians.       
      For each patient, your task is to extract a list of health concerns from the
      patient's response into one or more of the following options based on the most
      appropriate case(s).


      Options:

      1. "CANCER"

      Answer "CANCER" if the patient thinks cancer or a cancer-related issue is the
      greatest Canadian health concern.


      2. "OBESITY"
      
      Answer "OBESITY" if the patient thinks obesity or an obesity-related issue is the
      greatest Canadian health concern.
      
      
      3. "STROKE"

      Answer "STROKE" if the patient thinks stroke or a stroke-related issue is the
      greatest Canadian health concern.
      
      
      4. "COVID"

      Answer "COVID" if the patient thinks COVID-19 or a related issue (including
      mentions of "the pandemic") is the greatest Canadian health concern.
      
      
      5. "DIABETES"

      Answer "DIABETES" if the patient thinks diabetes or a diabetes-related issue is
      the greatest Canadian health concern.


      6. "DRUGS ALCOHOL SMOKING"
      
      Answer "DRUGS ALCOHOL SMOKING" if the patient thinks any or all of drugs, alcohol,
      smoking, or vaping (or a related issue) are the greatest Canadian health concern.
      
      
      7. "MENTAL HEALTH"

      Answer "MENTAL HEALTH" if the patient thinks mental health issues (including, but
      not limited to: depression, stress, anxiety, etc) are the greatest Canadian health
      concern.
      
      
      8. "DEMENTIA"

      Answer "DEMENTIA" if the patient thinks dementia or a dementia-related issue
      (including, but not limited to, alzheimer's) is the greatest Canadian health
      concern.
      
      
      9. "CARDIAC"

      Answer "CARDIAC" if the patient thinks cardiac or a cardiac-related issue
      (including, but not limited to: heart disease, heart failure, heart attack,
      high blood pressure, etc) is the greatest Canadian health concern.


      10. "LIFESTYLE"

      Answer "LIFESTYLE" if the patient thinks lifestyle or a lifestyle-related issue
      (including, but not limited to: lack of exercise, nutrition, diet, salt, etc) is
      the greatest Canadian health concern.


      11. "SYSTEMIC PROBLEMS"

      Answer "SYSTEMIC PROBLEMS" if the patient thinks system problems (including, but
      not limited to: delayed diagnosis, accessibility, accessing health care services,
      wait times, lack of funding, red tape, policies and procedure, communication, etc)
      are the greatest Canadian health concern.

      
      12. "OTHER: <concern>"

      Answer "OTHER: <concern>" if the patient mentions some other concern that does not
      fit in neatly with the above options. For example, fear, denial, climate change,
      or an aging population. Fill in the "<concern>" tag with a short (1-5 word)
      descriptive summary of the expressed concern. If the patient gives more than one
      concern that does not fit neatly into the above options, list each answer on a new
      line, such as:
      
      "OTHER: concern #1
      
      OTHER: concern #2"      
      
      
      13. "IRRELEVANT"

      Answer with "IRRELEVANT" if the patient fails to answer the interviewer's 
      question because they are talking about something other than what they believe
      to be the greatest health concern facing Canadians.


      Additional instructions:

      Answer with any of the options listed above that are appropriate. If more than
      one option is appropriate at the same time, list each appropriate option on
      a new line. For example, convert the snippet "I think it's cancer and obesity" to:

      "CANCER

      OBESITY"


      CAUTION: Each individual option *except* "OTHER" should only appear once. The
      options "IRRELEVANT" should always appear by itself. Do not output anything else.
    question_ids: [20]
    parser_type: MULTI_TAG
    few_shot_assign_ids: [UHN00201, UHN0001, UHN00251, UHN00301]
    parser_data:
      options:
        - { tag: "CANCER", repeatable: false, value_sep: null }
