  Q_19a:
    prompt: >-
      In the snippet below, the interviewer is asking each patient if they know
      what their medication is for. For each patient, your task is to extract a
      list of either medication names or the stated purpose of the medication
      from the patient's response into one or more of the following options based
      on the most appropriate case(s).
      
      
      1. "CARDIAC RELATED"

      Answer "CARDIAC RELATED" if the patient mentions a cardiac symptoms or diagnosis
      that their medication treats, states that their medication is cardiac related, or
      if they specifically name a cardiac related medication. The following
      (non-exhaustive) list are all expressions of cardiac related medications,
      symptoms, or diagnoses: heart failure, weak heart, poor heart function, heart
      attack, myocardial infarction, palpitations, blood pressure, ipf, heart, heart
      medication, heart disease, heart problems, heart failure, blood pressure, blood
      thinners, anticoagulants, hypertension, beta-blockers, arrhythmia, blood flow,
      afib, reduce heart rate, aneurysm, bypass surgery, inr, angina, valve problems,
      blood problem, shock treatment, hocom, v-tach, coronary artery disease, aspirin,
      cholesterol, spironolactone, bisoprolol, metoprolol, amiodarone, rosuvastatin,
      warfarin, trandolapril, hydralazine hydrochloride, lipitor, diltiazem, eliquis,
      apixaban, ramipril, atorvastatin, entresto, carvedilol, plavix, altace, digoxin,
      toloxin, etc. If the patient's response is exactly or similar to these expressions
      (including paraphrases), answer with "CARDIAC RELATED".
      
      
      2. "FLUID RETENTION"

      Answer "FLUID RETENTION" if the patient mentions a fluid retention symptom or
      diagnosis that their medication treats, states that their medication treats fluid
      retention, or if they specifically name a fluid retention medication. The following
      (non-exhaustive) list are all expressions of fluid retention medications, symptoms,
      or diagnoses: lasix, water pills, kidneys, kidney functions, furosemide, etc. If
      the patient's response is exactly or similar to these expressions (including
      paraphrases), answer with "FLUID RETENTION".
      
      
      3. "MENTAL HEALTH"

      Answer "MENTAL HEALTH" if the patient mentions a mental health symptom or
      diagnosis that their medication treats, states that their medication treats
      mental health, or if they specifically name a mental health medication. The
      following (non-exhaustive) list are all expressions of mental health medications,
      symptoms, or diagnoses: anxiety, depression, ptsd, bipolar, schizophrenia, etc.
      If the patient's response is exactly or similar to these expressions (including 
      paraphrases), answer with "MENTAL HEALTH".
      
      
      4. "PAIN RELATED"

      Answer "PAIN RELATED" if the patient mentions a pain related symptom or diagnosis
      that their medication treats, states that their medication treats pain, or if they
      specifically name a pain related medication (*other than aspirin*). The following
      (non-exhaustive) list are all expressions of pain related medications, symptoms,
      or diagnoses: pain, chronic pain, nerve pain, neuropathy, diabetic neuropathy, 
      fibromyalgia, headaches, tylenol 3, tylenol, advil, naproxen, ibuprofen,
      methadone, gabapentin, etc. If the patient's response is exactly or similar
      to these expressions (including paraphrases), answer with "PAIN RELATED".
      

      5. "GI RELATED"
      
      Answer "GI RELATED" if the patient mentions a GI (gastrointestinal) symptom or
      diagnosis that their medication treats, states that their medication treats a
      GI related issue, or if they specifically name a GI medication. The following
      (non-exhaustive) list are all expressions of GI medications, symptoms, or
      diagnoses: vomiting, nausea, dry mouth, GERD, heart burn, acid reflux, esophagus,
      indigestion, digestion issues, constipation, diarrhea, stomach, stomach pain,
      liver, crohn's disease, intestinal pain, controlling bloating, incontinence,
      gastrointestinal issues, gall stones, etc. If the patient's response is exactly
      or similar to these expressions (including paraphrases), answer with "GI RELATED".


      6. "BONE RELATED"

      Answer "BONE RELATED" if the patient mentions a bone related symptom or diagnosis
      that their medication treats, states that their medication treats bone issues, or
      if they specifically name a bone related medication. The following (non-exhaustive)
      list are all expressions of bone related medications, symptoms, or diagnoses: gout,
      arthritis, osteoporosis, bone infection, alipurinol, forteo, prolia, etc. If the
      patient's response is exactly or similar to these expressions (including
      paraphrases), answer with "BONE RELATED".


      7. "RESPIRATORY RELATED"

      Answer "RESPIRATORY RELATED" if the patient mentions a respiratory related symptom
      or diagnosis that their medication treats, states that their medication treats a
      respiratory related issue, or if they specifically name a respiratory related
      medication. The following (non-exhaustive) list are all expressions of respiratory
      related medications, symptoms, or diagnoses: asthma, lungs, egpa, copd, symbicort,
      coughing, etc. If the patient's response is exactly or similar to these expressions
      (including  paraphrases), answer with "RESPIRATORY RELATED".
      
      
      8. "ENDOCRINE RELATED"
      
      Answer "ENDOCRINE RELATED" if the patient mentions an endocrine related symptom
      or diagnosis that their medication treats, states that their medication treats
      an endocrine related issue, or if they specifically name an endocrine related
      medication. The following (non-exhaustive) list are all expressions of endocrine
      related medications, symptoms, or diagnoses: diabetes, islets of langerhans,
      thyroid, triglycerides, hyperlipidemia, synthroid, trajenta, metformin, etc. If
      the patient's response is exactly or similar to these expressions (including 
      paraphrases), answer with "ENDOCRINE RELATED".
      
      
      9. "INFECTIOUS DISEASE RELATED"

      Answer "INFECTIOUS DISEASE RELATED" if the patient mentions an infectious disease
      related symptom or diagnosis that their medication treats, states that their
      medication treats an infectious disease related issue, or if they specifically
      name an infectious disease related medication. The following (non-exhaustive) list
      are all expressions of infectious disease related medications, symptoms, or
      diagnoses: anti-shingle, cold sore, sinuses, anti-retroviral, antiviral, hiv,
      hsv2, verruca, genvoya, antibiotics, etc. If the patient's response is exactly or
      similar to these expressions (including  paraphrases), answer with "INFECTIOUS
      DISEASE RELATED".
        

      10. "CANCER RELATED"
      
      Answer "CANCER RELATED" if the patient mentions a caner related symptom or
      diagnosis that their medication treats, states that their medication treats a
      cancer related issue, or if they specifically name a cancer related medication.
      The following (non-exhaustive) list are all expressions of cancer related
      medications, symptoms, or diagnoses: prostate cancer, blood cancer, lymphoma, etc.
      If the patient's response is exactly or similar to these expressions (including 
      paraphrases), answer with "CANCER RELATED".
      
      
      11. "OTHER: <medication/symptom/diagnosis>"

      Answer "OTHER: <medication/symptom/diagnosis>" if the patient mentions some other
      medication, symptom, or diagnosis that does not fit in neatly with the above
      options. Fill in the "<medication/symptom/diagnosis>" tag with either the exact
      medication name, or else a short (1-5 word) descriptive summary of the symptom or
      diagnosis. If the patient gives more than one medication, symptom, or diagnosis
      that does not fit neatly into the above options, list each answer on a new line,
      such as:
      
      "OTHER: symptom #1
      
      OTHER: diagnosis #2"


      12. "IRRELEVANT"

      Answer with "IRRELEVANT" if the patient fails to answer the interviewer's 
      question because they are talking about something other than their medications.
      

      13. "NO DETAIL"
      
      If the patient answers in the affirmative, but without expanding further,
      answer with "NO DETAILS". For example, convert the snippet "yes, I do know 
      what they are for" to "NO DETAILS" since the patient provides no details on
      which specific medication they are taking.
      
      
      14. "UNKNOWN"
      
      It is possible that the patient says that they do not know or do not remember
      what medication they are taking or what it's for. In this case, add "UNKNOWN" to
      your output list. For example, convert the snippet "one medication is for my
      heart, and I also take one other medication, but I don't know what it's for" to:
      
      "CARDIAC RELATED

      UNKNOWN"


      Additional instructions:

      Answer with any of the options listed above that are appropriate. If more than
      one option is appropriate at the same time, list each appropriate option on
      a new line. For example, convert the snippet "I take medication for acid reflux
      and also take lasix" to:

      "GI RELATED

      FLUID RETENTION"


      CAUTION: Each individual option *except* "OTHER" should only appear once. The
      options "IRRELEVANT" and "NO DETAIL" should always appear by themselves. Do not
      output anything else.
    question_ids: [19a]
    parser_type: MULTI_TAG
    few_shot_assign_ids: [UHN0001, UHN00201, UHN00351]
    parser_data:
      options:
        - { tag: "CARDIAC RELATED", repeatable: false, value_sep: null }
        - { tag: "FLUID RETENTION", repeatable: false, value_sep: null }
        - { tag: "MENTAL HEALTH", repeatable: false, value_sep: null }
        - { tag: "PAIN RELATED", repeatable: false, value_sep: null }
        - { tag: "GI RELATED", repeatable: false, value_sep: null }
        - { tag: "BONE RELATED", repeatable: false, value_sep: null }
        - { tag: "RESPIRATORY RELATED", repeatable: false, value_sep: null }
        - { tag: "ENDOCRINE RELATED", repeatable: false, value_sep: null }
        - { tag: "INFECTIOUS DISEASE RELATED", repeatable: false, value_sep: null }
        - { tag: "CANCER RELATED", repeatable: false, value_sep: null }
        - { tag: "OTHER", repeatable: true, value_sep: ":" }
        - { tag: "IRRELEVANT", repeatable: false, value_sep: null }
        - { tag: "NO DETAIL", repeatable: false, value_sep: null }
        - { tag: "UNKNOWN", repeatable: false, value_sep: null }
