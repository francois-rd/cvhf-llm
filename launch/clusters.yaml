clusters:
  Q_01:
    prompt: >-
      In the snippet below, the interviewer is asking each patient to provide a 
      list of symptoms they are or have recently been experiencing that brought 
      them into the hospital for this current admission. For each patient, your 
      task is to extract specific symptoms or diagnoses from the patient's response
      into one or more of the following options based on the most appropriate case(s).


      Options:

      1. "SHORTNESS OF BREATH"

      Answer "SHORTNESS OF BREATH" if the patient is experiencing shortness of breath.
      The following (non-exhaustive) list are all expressions of shortness of breath:
      short of breath, shortage of breath, water in lungs, congestion, low oxygen,
      out of breath, can't breathe, breathing difficulty, wheezing, panting, labored
      breathing, etc. If the patient's response is exactly or similar to these
      expressions (including paraphrases), answer with "SHORTNESS OF BREATH".


      2. "FLUID RETENTION"

      Answer "FLUID RETENTION" if the patient is experiencing fluid retention. The
      following (non-exhaustive) list are all expressions of fluid retention: ascites,
      distention, stomach full, stomach discomfort, bloated abdomen, sharp pain in
      belly, edema, swelling, swelling legs, overweight, rapid weight gain, gained many
      pounds, fluid maintenance, etc. If the patient's response is exactly or similar
      to these expressions (including paraphrases), answer with "FLUID RETENTION".


      3. "FATIGUE"

      Answer "FATIGUE" if the patient is experiencing fatigue. The following
      (non-exhaustive) list are all expressions of fatigue: weak, tired, exhausted, low
      strength, low energy, inability to walk, not feeling well, feeling sick, can't
      carry a lot of weight, can't complete daily activities, etc. If the patient's
      response is exactly or similar to these expressions (including paraphrases),
      answer with "FATIGUE".


      4. "HEART FAILURE"

      Answer "HEART FAILURE" if the patient mentions a heart failure diagnosis. The
      following (non-exhaustive) list are all expressions of a heart failure diagnosis:
      heart failure, congestive heart failure, weak heart, poor heart function, etc. If
      the patient's response is exactly or similar to these expressions (including
      paraphrases), answer with "HEART FAILURE".
      

      5. "DIZZINESS"

      Answer "DIZZINESS" if the patient is experiencing dizziness or syncope. The
      following (non-exhaustive) list are all expressions of dizziness or syncope:
      dizziness, fainting, syncope, passed out, feeling like I'm going to pass out,
      collapsed, light headed, vertigo, loss of balance, etc. If the patient's response
      is exactly or similar to these expressions (including paraphrases), answer with
      "DIZZINESS".
      

      6. "MYOCARDIAL INFARCTION"

      Answer "MYOCARDIAL INFARCTION" if the patient mentions a myocardial infarction
      diagnosis or related symptoms. The following (non-exhaustive) list are all
      expressions of a myocardial infarction diagnosis or related symptoms: heart
      attack, heart pressure, heart pain, angina, chest pain, chest discomfort, chest
      pressure, chest tightness, heaviness, something sitting on my chest, pain when
      breathing, etc. If the patient's response is exactly or similar to these
      expressions (including paraphrases), answer with "MYOCARDIAL INFARCTION".
      

      7. "PALPITATIONS"

      Answer "PALPITATIONS" if the patient is experiencing palpitations. The following
      (non-exhaustive) list are all expressions of palpitations: heart racing, rapid
      heart rate, high pulse, heart pumping too much, heart pumping very fast, etc. If
      the patient's response is exactly or similar to these expressions (including
      paraphrases), answer with "PALPITATIONS".
      

      8. "BLOOD PRESSURE"

      Answer "BLOOD PRESSURE" if the patient mentions a blood pressure diagnosis. The
      following (non-exhaustive) list are all expressions of a blood pressure diagnosis:
      high blood pressure, low blood pressure, blood pressure, etc. If the patient's
      response is exactly or similar to these expressions (including paraphrases),
      answer with "BLOOD PRESSURE".
      

      9. "CARDIAC: <symptom/diagnosis>"

      Answer "CARDIAC: <symptom/diagnosis>" if the patient mentions some other cardiac
      symptom or diagnosis that does not fit into the more specific above options. Fill
      in the "<symptom/diagnosis>" tag with a short (1-5 word) descriptive summary of
      the symptom or diagnosis. The following (non-exhaustive) list are all expressions
      of other cardiac symptoms or diagnoses: angioplasty, malfunctioning pacemaker,
      arrhythmia, heart flutters, bad heart valve, leaking valve, valvular disease,
      mitral valve prolapse, aortic valve calcification, aortic valve anomaly, valve
      replacement, valve regurgitation, vad (ventricular artery disease), blockages,
      blocked arteries, left bundle branch block, afib (atrial fibrillation), cardiac
      arrest, bradycardia, hypertrophic cardiomyopathy, vt (ventricular tachycardia),
      shock from defibrillator, icd shock, ipf (idiopathic pulmonary fibrosis), heart
      problems, heart conditions, heart issues, etc. Use appropriate medical terminology
      to paraphrase the patient where possible. For example, if the patient expresses
      having "bad heart rhythm", answer with "CARDIAC: arrhythmia". 


      10. "NEUROLOGIC ISSUES"

      Answer "NEUROLOGIC ISSUES" if the patient is experiencing neurologic issues.
      The following (non-exhaustive) list are all expressions of neurologic issues:
      confusion, loss of memory, disorientation upon waking up, slurred speech, stroke,
      loss of use in right leg, loss of use in right arm, left arm numbness, cramping
      of the feet, sharp pains in heel, hot water sensation on foot, stabbing feeling,
      sharp/lightning bolts, very uncomfortable, tingling in fingers tingling in jaws,
      equilibrium off, restlessness, restless leg syndrome, hand shaking, headache, etc.
      If the patient's response is exactly or similar to these expressions (including
      paraphrases), answer with "NEUROLOGIC ISSUES".
      

      11. "INFECTION RELATED"

      Answer "INFECTION RELATED" if the patient is experiencing infection related
      issues. The following (non-exhaustive) list are all expressions of infection
      related issues: big sores with lots of pus, blisters all over legs, infection in
      legs, swelling in a wound in the leg, open wound on toe, blood poisoning, blood
      infection, lung infection, kidney infection, antibiotics, abscessed tooth, flu,
      strep throat, nose dripping, sinus cold, sneezing, fever, releasing mucus, phlegm,
      swollen lymph nodes, pneumonia, covid, covid vaccine, etc. If the patient's
      response is exactly or similar to these expressions (including paraphrases),
      answer with "INFECTION RELATED".
      

      12. "ENT ISSUES"

      Answer "ENT ISSUES" if the patient is experiencing ENT (ear, nose, throat) issues.
      The following (non-exhaustive) list are all expressions of ENT issues: head upset,
      ringing in ears, ear bleeding, pressure across the neck, throat constriction,
      throat swelling, feeling of a big rock on throat, fatigue in the throat, itchy
      throat, hoarse voice, losing my voice, tongue numbness, thyroid issue, ear issue,
      neck cancer, etc. If the patient's response is exactly or similar to these
      expressions (including paraphrases), answer with "ENT ISSUES".


      13. "GI ISSUES"

      Answer "GI ISSUES" if the patient is experiencing GI (gastrointestinal) issues.
      The following (non-exhaustive) list are all expressions of GI issues: anorexia,
      vomiting, lost appetite, nausea, increased appetite, lost taste buds, excessive
      saliva, dry mouth, GERD, heart burn, acid reflux, esophagitis, indigestion,
      digestion issues, dry heaves, gastroenteritis, epigastric concerns, milk allergy,
      gluten allergy, constipation, difficulty having bowel movements, diarrhea, stomach
      pain, intestinal pain, burping, belching, a lot of gas, flatulating, something in
      my gallbladder, gallstone, food poisoning, liver issues, etc. If the patient's
      response is exactly or similar to these expressions (including paraphrases),
      answer with "GI ISSUES".


      14. "UROLOGICAL/GYNECOLOGICAL ISSUES"

      Answer "UROLOGICAL/GYNECOLOGICAL ISSUES" if the patient is experiencing urological
      or gynecological issues. The following (non-exhaustive) list are all expressions
      of urological or gynecological issues: prostate issues, menstrual discomfort,
      kidney stones, kidney issues, inability to urinate, incontinence, using catheter,
      etc. If the patient's response is exactly or similar to these expressions
      (including paraphrases), answer with "UROLOGICAL/GYNECOLOGICAL ISSUES".
      

      15. "ELECTROLYTE ISSUES"

      Answer "ELECTROLYTE ISSUES" if the patient is experiencing electrolyte issues.
      The following (non-exhaustive) list are all expressions of electrolyte issues:
      low potassium, high potassium, low sodium, high sodium, etc. If the patient's
      response is exactly or similar to these expressions (including paraphrases),
      answer with "ELECTROLYTE ISSUES".
      
      
      16. "ORTHOPNEA"

      Answer "ORTHOPNEA" if the patient is experiencing orthopnea. The following
      (non-exhaustive) list are all expressions of orthopnea: difficulty sleeping,
      can't sleep, insomnia, prolonged time to fall asleep, can't sleep while lying
      down, inability to lie down, waking up gasping, unrest, sleep disturbance, etc.
      If the patient's response is exactly or similar to these expressions (including
      paraphrases), answer with "ORTHOPNEA".
      
      
      17. "ANXIETY"

      Answer "ANXIETY" if the patient is experiencing anxiety. The following
      (non-exhaustive) list are all expressions of anxiety: anxiety, fear, extreme
      fear, panic, panic attack, scared, worry, stress, mental stress, worried about
      health, irritability, etc. If the patient's response is exactly or similar to
      these expressions (including paraphrases), answer with "ANXIETY".


      18. "DEPRESSION"

      Answer "DEPRESSION" if the patient is experiencing depression. The following
      (non-exhaustive) list are all expressions of depression: depression, sadness,
      feeling of absence, emotional detachment, lack of wanting to do things, etc. If
      the patient's response is exactly or similar to these expressions (including 
      paraphrases), answer with "DEPRESSION".
      
      
      19. "MENTAL HEALTH"
      
      Answer "MENTAL HEALTH" if the patient is experiencing mental health issues
      *other than* anxiety or depression (which are in their own categories above). The
      following (non-exhaustive) list are all expressions of non-anxiety non-depression
      mental health issues: emotional problems, psychosomatic issues, lack of self
      control, head disturbed, stress of having new twins, financial difficulties, etc.
      If the patient's response is exactly or similar to these expressions (including 
      paraphrases), answer with "MENTAL HEALTH".


      20. "MSK ISSUES"

      Answer "MSK ISSUES" if the patient is experiencing MSK (musculoskeletal) issues.
      The following (non-exhaustive) list are all expressions of MSK issues: broken
      bones, hurting rotator cuff, onset of osteoarthritis, difficulty bending at the
      knee, hammer toes, cyst on the kneecap, etc. If the patient's response is exactly
      or similar to these expressions (including paraphrases), answer with "MSK ISSUES".
      
      
      21. "OPHTHALMOLOGY ISSUES"

      Answer "OPHTHALMOLOGY ISSUES" if the patient is experiencing ophthalmology issues.
      The following (non-exhaustive) list are all expressions of ophthalmology issues:
      loss of left eyesight, blurry eyes, vision problems, delayed vision, etc. If the
      patient's response is exactly or similar to these expressions (including
      paraphrases), answer with "OPHTHALMOLOGY ISSUES".
      

      22. "RESPIRATORY ISSUES"

      Answer "RESPIRATORY ISSUES" if the patient is experiencing respiratory issues.
      The following (non-exhaustive) list are all expressions of respiratory issues:
      rapid breathing, crackling noises when breathing, asthma, bronchitis, copd, etc.
      coughing, dry cough, coughing up blood, rapid breathing, crackling noises when
      breathing, asthma, bronchitis, copd, pleural effusion, etc. If the patient's
      response is exactly or similar to these expressions (including paraphrases),
      answer with "RESPIRATORY ISSUES".
      
      
      23. "THERMOREGULATION ISSUES"

      Answer "THERMOREGULATION ISSUES" if the patient is experiencing thermoregulation
      issues. The following (non-exhaustive) list are all expressions of
      thermoregulation issues: chills, feeling cold, fingers turning blue, poor
      circulation, cold sweats, night sweats, sweating, feeling hot, burning, hot
      flashes, flush, etc. If the patient's response is exactly or similar to these
      expressions (including paraphrases), answer with "THERMOREGULATION ISSUES".
      
      
      24. "DERMATOLOGY ISSUES"

      Answer "DERMATOLOGY ISSUES" if the patient is experiencing dermatology issues.
      The following (non-exhaustive) list are all expressions of dermatology issues:
      rash on the body, itching, skin hanging, skin rolls, right leg got blotchy, skin
      on leg felt punctured, redness, etc. If the patient's response is exactly or
      similar to these expressions (including paraphrases), answer with
      "DERMATOLOGY ISSUES".


      25. "OTHER: <symptom/diagnosis>"

      Answer "OTHER: <symptom/diagnosis>" if the patient mentions some other symptom
      or diagnosis that does not fit in neatly with the above options. Fill in the
      "<symptom/diagnosis>" tag with a short (1-5 word) descriptive summary of the
      symptom or diagnosis. If the patient gives more than one symptom or diagnosis
      that does not fit neatly into the above options, list each answer on a new line,
      such as:
      
      "OTHER: symptom #1
      
      OTHER: diagnosis #2"


      26. "IRRELEVANT"

      Answer with "IRRELEVANT" if the patient fails to answer the interviewer's 
      question because they are talking about something other than recent symptoms
      or diagnoses.


      Additional instructions:

      Answer with any of the options listed above that are appropriate. If more than
      one option is appropriate at the same time, list each appropriate option on
      a new line. For example, convert the snippet "I have shortness of breath, but also
      am experiencing depression" to:

      "SHORTNESS OF BREATH

      DEPRESSION"


      CAUTION: Each individual option *except* "CARDIAC" and "OTHER" should only appear
      once. The option "IRRELEVANT" should always appear by itself. Do not output
      anything else.
