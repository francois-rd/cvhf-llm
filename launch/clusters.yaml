  Q_24a:
    prompt: >-
      In the snippet below, the interviewer is asking each patient to provide
      either an interval of time or a specific date for how long they have been
      in Canada. Format your answer by extracting either an interval of time or
      a specific date according to the instructions below.
      
      
      Interval of time:
      
      1. For the interval of time, extract a numerical quantity and a unit of 
      time (choose from: minutes, hours, days, weeks, months, years).
      For example, "1 month" or "3 years".
      
      2. Convert numbers from text to digits. For example, convert the snippet
      "three days" to "3 days".
      
      3. Imprecise descriptions should be approximated as the nearest common 
      sense numerical value. For example, convert the snippet "about a month" to 
      "1 month". For example, convert the snippet "a couple days" to "2 days". 
      For example, convert the snippet "a few weeks" to "3 weeks". For example, 
      convert the snippet "several years" to "3 years".
      
      
      Specific date:
      
      1. For a specific date, extract and convert the date into a YEAR-MONTH-DAY
      numerical ISO format (YYYY-MM-DD). For example, convert the snippet
      "May 2nd 2018" to the ISO format "2018-05-02".
      
      2. For any specific date that mentions only the month but not a specific year,
      extract the string name of the month. For example, convert the snippet
      "this past Feb" to "February".
      
      3. For any specific date that mentions only the year but not a specific month,
      extract the numerical value of the year. For example, convert the snippet
      "it happened in 2019" to "2019".
      
      4. For any specific date that mentions both a month and a year but not a
      specific day of the month, assume it is the 15th day of the month *unless*
      the patient gives an approximate day (such as "beginning" which you should
      approximate as "1"; or "end" which you should approximate as "28"). Extract
      a numerical date in the ISO format: YYYY-MM-DD. For example, convert the
      snippet "March 2020" to "2020-03-15". For example, convert the snippet
      "beginning of July 2019" as "2019-07-01". For example, convert the snippet
      "end of October 2018" to "2018-10-28".
      
      5. These interviews were recorded on {reference_date}. As such, any
      mention of "last year" should be interpreted relative to {reference_date}.
      For example, "August of last year" would be the most recent August before
      {reference_date}.
      
      6. Keep in mind that some dates may be written as text instead of numbers.
      In these cases, convert the text into a numerical date format using the rules
      above. For example, convert the snippet "September first twenty eighteen"
      to "2018-09-01".
      
      
      Additional instructions:
      
      It is possible that the patient talks about something other than an interval
      of time or a specific date. In this case, your answer should be a single
      word: "IRRELEVANT". You should also answer with "IRRELEVANT" if the patient
      doesn't give a specific interval of time or data. For example, convert the
      snippet "a long time" to "IRRELEVANT". For example, convert the snippet "I
      don't remember" to "IRRELEVANT".
      
      
      Answer with either an interval of time or a specific date according to the
      format instructions above. Or answer with "IRRELEVANT" is no interval of
      time or specific date is mentioned. Do not output anything else.
    question_ids: [24a]
    parser_type: INTERVAL_OR_DATE_OR_REJECT
    few_shot_assign_ids: [UHN0001, UHN00051, UHN00151, UHN00301]
    system_prompt_index: 1
    parser_data: {"reject": IRRELEVANT}
  Q_25:
    prompt: >-
      In the snippet below, the interviewer is asking each patient what their
      highest level of education is. For each patient, your task is to extract
      one of the following options based on the most appropriate case.


      Options:

      1. "NONE"
      
      Answer with "NONE" if the patient did not attend any education whatsoever.
      
      
      2. "SOME GRADE SCHOOL"
      
      Answer with "SOME GRADE SCHOOL" if the patient did some grade school (also
      known as primary or elementary school), but did *not* finish grade school.
      
      
      3. "COMPLETED GRADE SCHOOL"
      
      Answer with "COMPLETED GRADE SCHOOL" if the patient's highest level of completed
      education is grade school (also known as primary or elementary school).
      
      
      4. "SOME HIGH SCHOOL"
      
      Answer with "SOME HIGH SCHOOL" if the patient did some high school (also
      secondary school), but did *not* finish high school.
      
      
      5. "COMPLETED HIGH SCHOOL"
      
      Answer with "COMPLETED HIGH SCHOOL" if the patient's highest level of completed
      education is high school (also known as secondary school).
      
      
      6. "TRADE SCHOOL"

      Answer with "TRADE SCHOOL" if the patient's highest level of education is
      a trade school or vocation school. Examples include: "plumber" or "electrician".
      
      
      7. "CERTIFICATE"
      
      Answer with "CERTIFICATE" if the patient completed some sort of Post-Secondary
      Certificate or Diploma (or equivalent degree). Examples include: Journeyman
      Certificates or Technical Education Diplomas. This also includes 2-year
      Associates degree or equivalent.
      
      
      8. "SOME COLLEGE OR UNIVERSITY"
      
      Answer with "SOME HIGH SCHOOL" if the patient did some amount of college or
      university studies, but did *not* finish their degree.
      
      
      9. "BACHELOR"
      
      Answer with "BACHELOR" if the patient's highest level of education is
      an undergraduate degree or equivalent. Examples include: "university",
      "bachelor", or "college". A mention of a specific field without a qualifying
      degree should be interpreted as "BACHELOR". Examples include: "psych",
      "finance", or "biology". These categories can include both art degrees and
      science degrees.
      
      
      10. "MASTERS"
      
      Answer with "MASTERS" if the patient's highest level of education is a master's
      degree or equivalent. Examples include: "master's", "MSc", "MA", or "MBA".
      
      
      11. "PROFESSIONAL"

      Answer with "PROFESSIONAL" if the patient's highest level of education is a
      professional degree or equivalent. Examples include: "MD", "JD", and "OD".
      
      
      12. "DOCTORAL"

      Answer with "DOCTORAL" if the patient's highest level of education is a
      doctoral degree (PhD) or equivalent.
    
    
      13. "UNKNOWN"
      
      Answer with "UNKNOWN" if the patient expresses uncertainty about their
      highest level of education. This can include expressions such as "I 
      can't remember" or "I don't know". Also answer with "UNKNOWN" if the
      patient mentions their occupation, but it is impossible to confidently
      infer their education level from that occupation.

      
      14. "IRRELEVANT"
      
      Answer with "IRRELEVANT" if the patient fails to answer the interviewer's 
      question because they are talking about something other than their highest
      level of education.
      
      
      Additional instructions:
      
      Answer with the most appropriate of the options listed above.
      Do not output anything else.
    question_ids: [25]
    parser_type: ENUM
    few_shot_assign_ids: [UHN0001, UHN00051, UHN00201, UHN00301, UHN00501]
    parser_data:
      enum_options:
        - "NONE"
        - "SOME GRADE SCHOOL"
        - "COMPLETED GRADE SCHOOL"
        - "SOME HIGH SCHOOL"
        - "COMPLETED HIGH SCHOOL"
        - "TRADE SCHOOL"
        - "CERTIFICATE"
        - "SOME COLLEGE OR UNIVERSITY"
        - "BACHELOR"
        - "MASTERS"
        - "PROFESSIONAL"
        - "DOCTORAL"
        - "UNKNOWN"
        - "IRRELEVANT"
  Q_25a:
