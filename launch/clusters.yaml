  Q_05:
    prompt: >-
      In the snippet below, the interviewer is asking each patient to provide
      either an interval of time or a specific date for how long their symptoms 
      last when the patient experiences them. Format your answer by extracting 
      either an interval of time or a specific date according to the instructions below.
      
      
      Interval of time:
      
      1. For the interval of time, extract a numerical quantity and a unit of 
      time (choose from: minutes, hours, days, weeks, months, years).
      For example, "1 month" or "3 years".
      
      2. Convert numbers from text to digits. For example, convert the snippet
      "three days" to "3 days".
      
      3. Imprecise descriptions should be approximated as the nearest common 
      sense numerical value. For example, convert the snippet "about a month" to 
      "1 month". For example, convert the snippet "a couple days" to "2 days". 
      For example, convert the snippet "a few weeks" to "3 weeks". For example, 
      convert the snippet "several years" to "3 years".
      
      
      Specific date:
      
      1. For a specific date, extract and convert the date into a YEAR-MONTH-DAY
      numerical ISO format (YYYY-MM-DD). For example, convert the snippet
      "May 2nd 2018" to the ISO format "2018-05-02".
      
      2. For any specific date that mentions only the month but not a specific year,
      extract the string name of the month. For example, convert the snippet
      "this past Feb" to "February".
      
      3. For any specific date that mentions only the year but not a specific month,
      extract the numerical value of the year. For example, convert the snippet
      "it happened in 2019" to "2019".
      
      4. For any specific date that mentions both a month and a year but not a
      specific day of the month, assume it is the 15th day of the month *unless*
      the patient gives an approximate day (such as "beginning" which you should
      approximate as "1"; or "end" which you should approximate as "28"). Extract
      a numerical date in the ISO format: YYYY-MM-DD. For example, convert the
      snippet "March 2020" to "2020-03-15". For example, convert the snippet
      "beginning of July 2019" as "2019-07-01". For example, convert the snippet
      "end of October 2018" to "2018-10-28".
      
      5. These interviews were recorded on {reference_date}. As such, any
      mention of "last year" should be interpreted relative to {reference_date}.
      For example, "August of last year" would be the most recent August before
      {reference_date}.
      
      6. Keep in mind that some dates may be written as text instead of numbers.
      In these cases, convert the text into a numerical date format using the rules
      above. For example, convert the snippet "September first twenty eighteen"
      to "2018-09-01".
      
      
      Additional instructions:
      
      It is possible that the patient talks about something other than an interval
      of time or a specific date. In this case, your answer should be a single
      word: "IRRELEVANT".
      
      
      Answer with either an interval of time or a specific date according to the
      format instructions above. Or answer with "IRRELEVANT" is no interval of
      time or specific date is mentioned. Do not output anything else.
    question_ids: [5]
    parser_type: INTERVAL_OR_DATE_OR_REJECT
    few_shot_assign_ids: [UHN0001, UHN00201, UHN00251]
    system_prompt_index: 1
    parser_data: {"reject": IRRELEVANT}
  Q_06:
    prompt: >-
      In the snippet below, the interviewer is asking each patient whether anything 
      makes their symptoms feel better or worse. For each patient, your task is to 
      extract one of the following options based on the most appropriate case.


      Options:
      
      1. "BETTER: YES"
      
      Answer "BETTER: YES" if the patient directly mentions something that makes 
      their symptoms better.

      
      2. "BETTER: NO"
      
      Answer "BETTER: NO" if the patient directly mentions that nothing makes 
      their symptoms better.


      3. "WORSE: YES"
      
      Answer "WORSE: YES" if the patient directly mentions something that makes 
      their symptoms worse.


      4. "WORSE: NO"
      
      Answer "WORSE: NO" if the patient directly mentions that nothing makes 
      their symptoms worse.


      5. "UNQUALIFIED: YES"
      
      Answer "UNQUALIFIED: YES" only if the patient answers in the affirmative
      (for example, "yes", "yeah", "for sure", etc.) without qualifying if they
      are talking about making things better or worse.


      6. "UNQUALIFIED: NO"
      
      Answer "UNQUALIFIED: NO" only if the patient answers in the negative (for
      example, "no", "nah", "nothing", " I don't think so", etc.) without
      qualifying if they are talking about making things better or worse.


      7. "UNSURE"

      Answer "UNSURE" if the patient expresses doubt or uncertainty instead of 
      giving a definitive response.


      8. "IRRELEVANT"

      Answer "IRRELEVANT" if the patient talks about something other than 
      activities that make their symptoms better or worse.

      
      Additional instructions:
      
      Answer with the most appropriate of the options listed above.
      Do not output anything else.
    question_ids: [6]
    parser_type: ENUM
    few_shot_assign_ids: [UHN00051, UHN00251, UHN00501]
    parser_data:
      enum_options:
        - "BETTER: YES"
        - "BETTER: NO"
        - "WORSE: YES"
        - "WORSE: NO"
        - "UNQUALIFIED: YES"
        - "UNQUALIFIED: NO"
        - "UNSURE"
        - "IRRELEVANT"
  Q_07_07a_07b:
    prompt: >-
      In the snippet below, the interviewer is asking each patient whether their
      function is impaired and how far they can walk. For each patient, your task 
      is to extract one of the following options based on the most appropriate case.

      
      NOTE: The following options are based on the New York Heart Association 
      (NYHA) Functional Classification for Heart Failure. Select the most 
      appropriate option based on the given criteria describing each option.


      Options:

      1. "NO LIMITATION"

      Answer "NO LIMITATION" if the patient's response most closely aligns with
      the following criteria:
      
      - No limitation of physical activity
      
      - Ordinary physical activity does not cause undue fatigue, palpitation, or dyspnea


      2. "SLIGHT LIMITATION"

      Answer "SLIGHT LIMITATION" if the patient's response most closely aligns
      with the following criteria:

      - Slight limitation of physical activity

      - Comfortable at rest
      
      - Ordinary physical activity results in fatigue, palpitation, or dyspnea

      
      3. "MARKED LIMITATION"
      
      Answer "MARKED LIMITATION" if the patient's response most closely aligns 
      with the following criteria:
      
      - Marked limitation of physical activity
      
      - Comfortable at rest
      
      - Less than ordinary activity causes fatigue, palpitation, or dyspnea

      
      4. "FULL LIMITATION"
      
      Answer "FULL LIMITATION" if the patient's response most closely aligns 
      with the following criteria:
      
      - Unable to carry on any physical activity without discomfort
      
      - Symptoms of heart failure at rest
      
      - If any physical activity is undertaken, discomfort increases

      
      5. "IRRELEVANT"
      
      Answer "IRRELEVANT" if the patient talks about something other than their 
      functioning in daily activities and how far they can walk.

      
      Additional instructions:
      
      Answer with the most appropriate of the options listed above.
      Do not output anything else.
    question_ids: ["7", "7a", "7b"]
    parser_type: ENUM
    few_shot_assign_ids: [UHN00251, UHN00451, UHN00501]
    parser_data:
      enum_options:
        - "NO LIMITATION"
        - "SLIGHT LIMITATION"
        - "MARKED LIMITATION"
        - "FULL LIMITATION"
        - "IRRELEVANT"
  Q_08:
    prompt: >-
      In the snippet below, the interviewer is asking each patient when they first 
      noticed their current symptoms. Format your answer by extracting either an
      interval of time or a specific date according to the instructions below.
      
      
      Interval of time:
      
      1. For the interval of time, extract a numerical quantity and a unit of 
      time (choose from: minutes, hours, days, weeks, months, years).
      For example, "1 month" or "3 years".
      
      2. Convert numbers from text to digits. For example, convert the snippet
      "three days" to "3 days".
      
      3. Imprecise descriptions should be approximated as the nearest common 
      sense numerical value. For example, convert the snippet "about a month" to 
      "1 month". For example, convert the snippet "a couple days" to "2 days". 
      For example, convert the snippet "a few weeks" to "3 weeks". For example, 
      convert the snippet "several years" to "3 years".
      
      
      Specific date:
      
      1. For a specific date, extract and convert the date into a YEAR-MONTH-DAY
      numerical ISO format (YYYY-MM-DD). For example, convert the snippet
      "May 2nd 2018" to the ISO format "2018-05-02".
      
      2. For any specific date that mentions only the month but not a specific year,
      extract the string name of the month. For example, convert the snippet
      "this past Feb" to "February".
      
      3. For any specific date that mentions only the year but not a specific month,
      extract the numerical value of the year. For example, convert the snippet
      "it happened in 2019" to "2019".
      
      4. For any specific date that mentions both a month and a year but not a
      specific day of the month, assume it is the 15th day of the month *unless*
      the patient gives an approximate day (such as "beginning" which you should
      approximate as "1"; or "end" which you should approximate as "28"). Extract
      a numerical date in the ISO format: YYYY-MM-DD. For example, convert the
      snippet "March 2020" to "2020-03-15". For example, convert the snippet
      "beginning of July 2019" as "2019-07-01". For example, convert the snippet
      "end of October 2018" to "2018-10-28".
      
      5. These interviews were recorded on {reference_date}. As such, any
      mention of "last year" should be interpreted relative to {reference_date}.
      For example, "August of last year" would be the most recent August before
      {reference_date}.
      
      6. Keep in mind that some dates may be written as text instead of numbers.
      In these cases, convert the text into a numerical date format using the rules
      above. For example, convert the snippet "September first twenty eighteen"
      to "2018-09-01".
      
      
      Additional instructions:
      
      It is possible that the patient talks about something other than an interval
      of time or a specific date. In this case, your answer should be a single
      word: "IRRELEVANT".
      
      
      Answer with either an interval of time or a specific date according to the
      format instructions above. Or answer with "IRRELEVANT" is no interval of
      time or specific date is mentioned. Do not output anything else.
    question_ids: [8]
    parser_type: INTERVAL_OR_DATE_OR_REJECT
    few_shot_assign_ids: [UHN00051, UHN00101, UHN00201]
    system_prompt_index: 1
    parser_data: {"reject": IRRELEVANT}
  Q_08a:
    prompt: >-
      In the snippet below, the interviewer is asking each patient to provide a 
      list of causes that the patient initially thought were the source of their 
      current symptoms. For each patient, your task is to extract a list of specific
      causes, symptoms, feelings, or diagnoses from the patient's response into one
      or more of the following options based on the most appropriate case(s).


      Options:

      1. "SHORTNESS OF BREATH"

      Answer "SHORTNESS OF BREATH" if the patient thinks shortness of breath is a cause.
      The following (non-exhaustive) list are all expressions of shortness of breath:
      short of breath, shortage of breath, water in lungs, congestion, low oxygen,
      out of breath, can't breathe, breathing difficulty, wheezing, panting, labored
      breathing, etc. If the patient's response is exactly or similar to these
      expressions (including paraphrases), answer with "SHORTNESS OF BREATH".


      2. "FLUID RETENTION"

      Answer "FLUID RETENTION" if the patient thinks fluid retention is a cause. The
      following (non-exhaustive) list are all expressions of fluid retention: ascites,
      distention, stomach full, stomach discomfort, bloated abdomen, sharp pain in
      belly, edema, swelling, swelling legs, overweight, rapid weight gain, gained many
      pounds, fluid maintenance, etc. If the patient's response is exactly or similar
      to these expressions (including paraphrases), answer with "FLUID RETENTION".


      3. "FATIGUE"

      Answer "FATIGUE" if the patient thinks fatigue is a cause. The following
      (non-exhaustive) list are all expressions of fatigue: weak, tired, exhausted, low
      strength, low energy, inability to walk, not feeling well, feeling sick, can't
      carry a lot of weight, can't complete daily activities, etc. If the patient's
      response is exactly or similar to these expressions (including paraphrases),
      answer with "FATIGUE".


      4. "HEART FAILURE"

      Answer "HEART FAILURE" if the patient thinks heart failure is a cause. The
      following (non-exhaustive) list are all expressions of a heart failure diagnosis:
      heart failure, congestive heart failure, weak heart, poor heart function, etc. If
      the patient's response is exactly or similar to these expressions (including
      paraphrases), answer with "HEART FAILURE".
      

      5. "DIZZINESS"

      Answer "DIZZINESS" if the patient thinks dizziness or syncope is a cause. The
      following (non-exhaustive) list are all expressions of dizziness or syncope:
      dizziness, fainting, syncope, passed out, feeling like I'm going to pass out,
      collapsed, light headed, vertigo, loss of balance, etc. If the patient's response
      is exactly or similar to these expressions (including paraphrases), answer with
      "DIZZINESS".
      

      6. "MYOCARDIAL INFARCTION"

      Answer "MYOCARDIAL INFARCTION" if the patient thinks a myocardial infarction
      or related symptom is a cause. The following (non-exhaustive) list are all
      expressions of a myocardial infarction diagnosis or related symptoms: heart
      attack, heart pressure, heart pain, angina, chest pain, chest discomfort, chest
      pressure, chest tightness, heaviness, something sitting on my chest, pain when
      breathing, etc. If the patient's response is exactly or similar to these
      expressions (including paraphrases), answer with "MYOCARDIAL INFARCTION".
      

      7. "PALPITATIONS"

      Answer "PALPITATIONS" if the patient thinks palpitations are a cause. The following
      (non-exhaustive) list are all expressions of palpitations: heart racing, rapid
      heart rate, high pulse, heart pumping too much, heart pumping very fast, etc. If
      the patient's response is exactly or similar to these expressions (including
      paraphrases), answer with "PALPITATIONS".
      

      8. "BLOOD PRESSURE"

      Answer "BLOOD PRESSURE" if the patient thinks their blood pressure is a cause. The
      following (non-exhaustive) list are all expressions of a blood pressure diagnosis:
      high blood pressure, low blood pressure, blood pressure, etc. If the patient's
      response is exactly or similar to these expressions (including paraphrases),
      answer with "BLOOD PRESSURE".
      

      9. "CARDIAC: <symptom/diagnosis>"

      Answer "CARDIAC: <symptom/diagnosis>" if the patient thinks some other cardiac
      symptom or diagnosis that does not fit into the more specific above options is a
      cause. Fill in the "<symptom/diagnosis>" tag with a short (1-5 word) descriptive
      summary of the symptom or diagnosis. The following (non-exhaustive) list are all
      expressions of other cardiac symptoms or diagnoses: angioplasty, malfunctioning
      pacemaker, arrhythmia, heart flutters, bad heart valve, leaking valve, valvular
      disease, mitral valve prolapse, aortic valve calcification, aortic valve anomaly,
      valve replacement, valve regurgitation, vad (ventricular artery disease), blockages,
      blocked arteries, left bundle branch block, afib (atrial fibrillation), cardiac
      arrest, bradycardia, hypertrophic cardiomyopathy, vt (ventricular tachycardia),
      shock from defibrillator, icd shock, ipf (idiopathic pulmonary fibrosis), heart
      problems, heart conditions, heart issues, etc. Use appropriate medical terminology
      to paraphrase the patient where possible. For example, if the patient expresses
      having "bad heart rhythm", answer with "CARDIAC: arrhythmia". 


      10. "NEUROLOGIC ISSUES"

      Answer "NEUROLOGIC ISSUES" if the patient thinks neurologic issues are a cause.
      The following (non-exhaustive) list are all expressions of neurologic issues:
      confusion, loss of memory, disorientation upon waking up, slurred speech, stroke,
      loss of use in right leg, loss of use in right arm, left arm numbness, cramping
      of the feet, sharp pains in heel, hot water sensation on foot, stabbing feeling,
      sharp/lightning bolts, very uncomfortable, tingling in fingers tingling in jaws,
      equilibrium off, restlessness, restless leg syndrome, hand shaking, headache, etc.
      If the patient's response is exactly or similar to these expressions (including
      paraphrases), answer with "NEUROLOGIC ISSUES".
      

      11. "INFECTION RELATED"

      Answer "INFECTION RELATED" if the patient thinks infection related issues are a
      cause. The following (non-exhaustive) list are all expressions of infection
      related issues: big sores with lots of pus, blisters all over legs, infection in
      legs, swelling in a wound in the leg, open wound on toe, blood poisoning, blood
      infection, lung infection, kidney infection, antibiotics, abscessed tooth, flu,
      strep throat, nose dripping, sinus cold, sneezing, fever, releasing mucus, phlegm,
      swollen lymph nodes, pneumonia, covid, covid vaccine, etc. If the patient's
      response is exactly or similar to these expressions (including paraphrases),
      answer with "INFECTION RELATED".
      

      12. "ENT ISSUES"

      Answer "ENT ISSUES" if the patient thinks ENT (ear, nose, throat) issues are a
      cause. The following (non-exhaustive) list are all expressions of ENT issues: head
      upset, ringing in ears, ear bleeding, pressure across the neck, throat constriction,
      throat swelling, feeling of a big rock on throat, fatigue in the throat, itchy
      throat, hoarse voice, losing my voice, tongue numbness, thyroid issue, ear issue,
      neck cancer, etc. If the patient's response is exactly or similar to these
      expressions (including paraphrases), answer with "ENT ISSUES".


      13. "GI ISSUES"

      Answer "GI ISSUES" if the patient thinks GI (gastrointestinal) issues are a cause.
      The following (non-exhaustive) list are all expressions of GI issues: anorexia,
      vomiting, lost appetite, nausea, increased appetite, lost taste buds, excessive
      saliva, dry mouth, GERD, heart burn, acid reflux, esophagitis, indigestion,
      digestion issues, dry heaves, gastroenteritis, epigastric concerns, milk allergy,
      gluten allergy, constipation, difficulty having bowel movements, diarrhea, stomach
      pain, intestinal pain, burping, belching, a lot of gas, flatulating, something in
      my gallbladder, gallstone, food poisoning, liver issues, etc. If the patient's
      response is exactly or similar to these expressions (including paraphrases),
      answer with "GI ISSUES".


      14. "UROLOGICAL/GYNECOLOGICAL ISSUES"

      Answer "UROLOGICAL/GYNECOLOGICAL ISSUES" if the patient thinks urological or
      gynecological issues are a cause. The following (non-exhaustive) list are all
      expressions of urological or gynecological issues: prostate issues, menstrual
      discomfort, kidney stones, kidney issues, inability to urinate, incontinence,
      using catheter, etc. If the patient's response is exactly or similar to these
      expressions (including paraphrases), answer with "UROLOGICAL/GYNECOLOGICAL ISSUES".
      

      15. "ELECTROLYTE ISSUES"

      Answer "ELECTROLYTE ISSUES" if the patient thinks electrolyte issues are a cause.
      The following (non-exhaustive) list are all expressions of electrolyte issues:
      low potassium, high potassium, low sodium, high sodium, etc. If the patient's
      response is exactly or similar to these expressions (including paraphrases),
      answer with "ELECTROLYTE ISSUES".
      
      
      16. "ORTHOPNEA"

      Answer "ORTHOPNEA" if the patient thinks orthopnea is a cause. The following
      (non-exhaustive) list are all expressions of orthopnea: difficulty sleeping,
      can't sleep, insomnia, prolonged time to fall asleep, can't sleep while lying
      down, inability to lie down, waking up gasping, unrest, sleep disturbance, etc.
      If the patient's response is exactly or similar to these expressions (including
      paraphrases), answer with "ORTHOPNEA".
      
      
      17. "ANXIETY"

      Answer "ANXIETY" if the patient thinks anxiety is a cause. The following
      (non-exhaustive) list are all expressions of anxiety: anxiety, fear, extreme
      fear, panic, panic attack, scared, worry, stress, mental stress, worried about
      health, irritability, etc. If the patient's response is exactly or similar to
      these expressions (including paraphrases), answer with "ANXIETY".


      18. "DEPRESSION"

      Answer "DEPRESSION" if the patient thinks depression is a cause. The following
      (non-exhaustive) list are all expressions of depression: depression, sadness,
      feeling of absence, emotional detachment, lack of wanting to do things, etc. If
      the patient's response is exactly or similar to these expressions (including 
      paraphrases), answer with "DEPRESSION".
      
      
      19. "MENTAL HEALTH"
      
      Answer "MENTAL HEALTH" if the patient thinks mental health issues *other than*
      anxiety or depression (which are in their own categories above) are a cause. The
      following (non-exhaustive) list are all expressions of non-anxiety non-depression
      mental health issues: emotional problems, psychosomatic issues, lack of self
      control, head disturbed, stress of having new twins, financial difficulties, etc.
      If the patient's response is exactly or similar to these expressions (including 
      paraphrases), answer with "MENTAL HEALTH".


      20. "MSK ISSUES"

      Answer "MSK ISSUES" if the patient thinks MSK (musculoskeletal) issues are a cause.
      The following (non-exhaustive) list are all expressions of MSK issues: broken
      bones, hurting rotator cuff, onset of osteoarthritis, difficulty bending at the
      knee, hammer toes, cyst on the kneecap, etc. If the patient's response is exactly
      or similar to these expressions (including paraphrases), answer with "MSK ISSUES".
      
      
      21. "OPHTHALMOLOGY ISSUES"

      Answer "OPHTHALMOLOGY ISSUES" if the patient thinks ophthalmology issues are a
      cause. The following (non-exhaustive) list are all expressions of ophthalmology
      issues: loss of left eyesight, blurry eyes, vision problems, delayed vision, etc.
      If the patient's response is exactly or similar to these expressions (including
      paraphrases), answer with "OPHTHALMOLOGY ISSUES".
      

      22. "RESPIRATORY ISSUES"

      Answer "RESPIRATORY ISSUES" if the patient thinks respiratory issues are a cause.
      The following (non-exhaustive) list are all expressions of respiratory issues:
      coughing, dry cough, coughing up blood, rapid breathing, crackling noises when
      breathing, asthma, bronchitis, copd, pleural effusion, etc. If the patient's
      response is exactly or similar to these expressions (including paraphrases),
      answer with "RESPIRATORY ISSUES".
      
      
      23. "THERMOREGULATION ISSUES"

      Answer "THERMOREGULATION ISSUES" if the patient thinks thermoregulation issues
      are a cause. The following (non-exhaustive) list are all expressions of
      thermoregulation issues: chills, feeling cold, fingers turning blue, poor
      circulation, cold sweats, night sweats, sweating, feeling hot, burning, hot
      flashes, flush, etc. If the patient's response is exactly or similar to these
      expressions (including paraphrases), answer with "THERMOREGULATION ISSUES".
      
      
      24. "DERMATOLOGY ISSUES"

      Answer "DERMATOLOGY ISSUES" if the patient thinks dermatology issues are a cause.
      The following (non-exhaustive) list are all expressions of dermatology issues:
      rash on the body, itching, skin hanging, skin rolls, right leg got blotchy, skin
      on leg felt punctured, redness, etc. If the patient's response is exactly or
      similar to these expressions (including paraphrases), answer with
      "DERMATOLOGY ISSUES".
      
      
      25. "LIFESTYLE CHOICES"

      Answer "LIFESTYLE CHOICES" if the patient thinks their lifestyle choices are
      a cause. The following (non-exhaustive) list are all expressions of lifestyle
      choices: diet, smoking, bad batch of cigarettes, lack of exercise, being
      overweight, alcohol, eating too much salt, inadequate liquid intake, etc. If
      the patient's response is exactly or similar to these expressions (including
      paraphrases), answer with "LIFESTYLE CHOICES".
      
      
      26. "MEDICATION RELATED"

      Answer "MEDICATION RELATED" if the patient thinks medication related issues are
      a cause. The following (non-exhaustive) list are all expressions of medication
      related issues: blood thinner, antibiotics, medication interaction, medication
      change, increased dosage of pharmaceuticals, higher dosage of beta blockers,
      cutting off beta blocker, forgetting to take vitamins, diuretics, new medication,
      ventolin, neocitran, cold tablets, furosemide, drugs, etc. If the patient's
      response is exactly or similar to these expressions (including paraphrases),
      answer with "MEDICATION RELATED".
      
      
      27. "SURGERY COMPLICATION"

      Answer "SURGERY COMPLICATION" if the patient thinks a surgery complication is
      a cause. The following (non-exhaustive) list are all expressions of surgery
      complications: open heart surgery complication, healing from surgery, unsuccessful
      operation, etc. If the patient's response is exactly or similar to these
      expressions (including paraphrases), answer with "SURGERY COMPLICATION".


      28. "OTHER: <symptom/diagnosis>"

      Answer "OTHER: <symptom/diagnosis>" if the patient mentions some other symptom
      or diagnosis that does not fit in neatly with the above options. Fill in the
      "<symptom/diagnosis>" tag with a short (1-5 word) descriptive summary of the
      symptom or diagnosis. If the patient gives more than one symptom or diagnosis
      that does not fit neatly into the above options, list each answer on a new line,
      such as:
      
      "OTHER: symptom #1
      
      OTHER: diagnosis #2"


      29. "IRRELEVANT"

      Answer with "IRRELEVANT" if the patient fails to answer the interviewer's 
      question because they are talking about something other than a potential cause
      of their recent hospitalization.
      
      
      30. "UNKNOWN"
      
      It is possible that the patient says that they do not know or do not remember a
      specific cause. In this case, your answer should be a single word: "UNKNOWN".


      Additional instructions:

      Answer with any of the options listed above that are appropriate. If more than
      one option is appropriate at the same time, list each appropriate option on
      a new line. For example, convert the snippet "I came in to hospital because of
      shortness of breath and also depression" to:

      "SHORTNESS OF BREATH

      DEPRESSION"


      CAUTION: Each individual option *except* "CARDIAC" and "OTHER" should only appear
      once. The options "IRRELEVANT" and "UNKNOWN" should always appear by themselves.
      Do not output anything else.


      NOTE: Be sure to only list the causes the patient suspected in the past,
      not what they currently believe.
    question_ids: [8a]
