      Answer with "NONE" if the patient's parents did not attend any education
      whatsoever.


      2. "SOME GRADE SCHOOL"

      Answer with "SOME GRADE SCHOOL" if the patient's parents did some grade school
      (also known as primary or elementary school), but did *not* finish grade school.


      3. "COMPLETED GRADE SCHOOL"

      Answer with "COMPLETED GRADE SCHOOL" if the patient's parents' highest level of
      completed education is grade school (also known as primary or elementary school).


      4. "SOME HIGH SCHOOL"

      Answer with "SOME HIGH SCHOOL" if the patient's parents did some high school
      (also secondary school), but did *not* finish high school.


      5. "COMPLETED HIGH SCHOOL"

      Answer with "COMPLETED HIGH SCHOOL" if the patient's parents' highest level of
      completed education is high school (also known as secondary school).


      6. "TRADE SCHOOL"

      Answer with "TRADE SCHOOL" if the patient's parents' highest level of education is
      a trade school or vocation school. Examples include: "plumber" or "electrician".


      7. "CERTIFICATE"

      Answer with "CERTIFICATE" if the patient's parents completed some sort of
      Post-Secondary Certificate or Diploma (or equivalent degree). Examples include:
      Journeyman Certificates or Technical Education Diplomas. This also includes
      2-year Associates degree or equivalent.


      8. "SOME COLLEGE OR UNIVERSITY"

      Answer with "SOME HIGH SCHOOL" if the patient's parents did some amount of
      college or university studies, but did *not* finish their degree.


      9. "BACHELOR"

      Answer with "BACHELOR" if the patient's parents' highest level of education is
      an undergraduate degree or equivalent. Examples include: "university",
      "bachelor", or "college". A mention of a specific field without a qualifying
      degree should be interpreted as "BACHELOR". Examples include: "psych",
      "finance", or "biology". These categories can include both art degrees and
      science degrees.


      10. "MASTERS"

      Answer with "MASTERS" if the patient's parents' highest level of education 
      is a master's degree or equivalent. Examples include: "master's", "MSc", 
      "MA", or "MBA".


      11. "PROFESSIONAL"

      Answer with "PROFESSIONAL" if the patient's parents' highest level of education
      is a professional degree or equivalent. Examples include: "MD", "JD", and "OD".


      12. "DOCTORAL"

      Answer with "DOCTORAL" if the patient's parents' highest level of education
      is a doctoral degree (PhD) or equivalent.


      13. "UNKNOWN"

      Answer with "UNKNOWN" if the patient expresses uncertainty about their parents'
      highest level of education. This can include expressions such as "I can't
      remember" or "I don't know". Also answer with "UNKNOWN" if the patient mentions
      their parents' occupations, but it is impossible to confidently infer their
      education level from those occupations.


      14. "IRRELEVANT"
      
      Answer with "IRRELEVANT" if the patient fails to answer the interviewer's 
      question because they are talking about something other than their parents'
      highest level of education.
      
      
      Additional instructions:
      
      Reminder: If the patient's parents each have a different education level,
      answer with the highest level mentioned.
      
      Answer with the most appropriate of the options listed above.
      Do not output anything else.
