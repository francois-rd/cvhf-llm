      (e.g., family, friend, doctor, nurse practitioner, etc), so long as the
      patient affirmatively states that they *do* have support.
      
      
      2. "SOMEWHAT"
      
      Answer with "SOMEWHAT" if the patient expresses that they only somewhat have
      support for managing their heart failure. This can include expressions such 
      as "maybe" or "sometimes". It does not matter who the support is from (e.g.,
      family, friend, doctor, nurse practitioner, etc), so long as the patient
      affirmatively states that they *somewhat* have support.
      
      
      3. "NO"

      Answer with "NO" if the patient expresses that they do *not* have support
      for managing their heart failure.

      
      4. "UNSURE"

      Answer "UNSURE" if the patient expresses doubt or uncertainty instead of 
      giving a definitive response.

      
      5. "IRRELEVANT"
      
      Answer with "IRRELEVANT" if the patient fails to answer the interviewer's 
      question because they are talking about something other than whether they
      have support for managing their heart failure.
      
      
      Additional instructions:
      
      Answer with the most appropriate of the options listed above.
