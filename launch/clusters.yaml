  Q_19c:
    prompt: >-      
      In the snippet below, the interviewer is asking each patient whether or not
      they feel better, the same, or worse since starting their medication. For
      each patient, your task is to convert the patient's response into or or more
      of the following options based on the most appropriate case.


      Options:

      1. "BETTER: <medication or purpose>"

      For each specific medication that the patient mentions makes them feel better,
      answer with "BETTER: <medication or purpose>". Fill "<medication or purpose>"
      with the name of the medication or the stated purpose of the medication. For
      example, convert "Lasix makes me feel better" to "BETTER: Lasix" since Lasix
      is the name of a medication. For example, convert "the one for the heart
      makes me feel better" to "BETTER: heart".
      
      
      NOTE: If the patient mentions feeling better but without specifying which
      medication, fill in "<medication or purpose>" with the special tag
      "UNSPECIFIED". For example, convert the snippet "Yes, it makes me feel
      better" to "BETTER: UNSPECIFIED", since the patient fails to specify which
      specific medication makes them feel better.
      
      
      2. "SAME: <medication or purpose>"

      For each specific medication that the patient mentions makes them feel the same,
      answer with "SAME: <medication or purpose>". Fill "<medication or purpose>"
      with the name of the medication or the stated purpose of the medication. For
      example, convert "Lasix makes me feel the same" to "SAME: Lasix" since Lasix
      is the name of a medication. For example, convert "the one for the heart
      makes me feel the same" to "SAME: heart".


      NOTE: If the patient mentions feeling the same but without specifying which
      medication, fill in "<medication or purpose>" with the special tag
      "UNSPECIFIED". For example, convert the snippet "It makes me feel the same"
      to "SAME: UNSPECIFIED", since the patient fails to specify which
      specific medication makes them feel the same.


      3. "WORSE: <medication or purpose>"

      For each specific medication that the patient mentions makes them feel worse,
      answer with "WORSE: <medication or purpose>". Fill "<medication or purpose>"
      with the name of the medication or the stated purpose of the medication. For
      example, convert "Lasix makes me feel worse" to "WORSE: Lasix" since Lasix
      is the name of a medication. For example, convert "the one for the heart
      makes me feel worse" to "WORSE: heart".


      NOTE: If the patient mentions feeling worse but without specifying which
      medication, fill in "<medication or purpose>" with the special tag
      "UNSPECIFIED". For example, convert the snippet "It makes me feel worse"
      to "WORSE: UNSPECIFIED", since the patient fails to specify which
      specific medication makes them feel worse.


      4. "UNSURE: <medication or purpose>"

      For each specific medication that the patient mentions where they are unsure
      whether it makes them feel better, the same, or worse, answer with "UNSURE:
      <medication or purpose>". Fill "<medication or purpose>" with the name of
      the medication or the stated purpose of the medication. For example, convert
      "I don't know if Lasix is helping" to "UNSURE: Lasix" since Lasix
      is the name of a medication. For example, convert "the one for the heart
      I don't know if it's helping" to "UNSURE: heart".


      NOTE: If the patient mentions they are unsure but without specifying which
      medication they are unsure about, fill in "<medication or purpose>" with
      the special tag "UNSPECIFIED". For example, convert the snippet "I'm not
      sure if it's helping" to "UNSURE: UNSPECIFIED", since the patient fails to
      specify which specific medication they are unsure about.
      
      
      5. "IRRELEVANT"

      Answer with "IRRELEVANT" if the patient fails to answer the interviewer's 
      question because they are talking about something other than whether or not
      their medication is making them feel better, the same or, worse.


      Additional instructions:

      Answer with any of the options listed above that are appropriate. If more than
      one option is appropriate at the same time, list each appropriate option on
      a new line. For example, convert the snippet "The Lasix is helping, but the
      other I'm not sure" to
      
      "BETTER: Lasix
      
      UNSURE: UNSPECIFIED"
      
      
      NOTE: "IRRELEVANT" should only appear once (when the case is appropriate).
      
      
      Answer according to the format specification described above.
      Do not output anything else.
    question_ids: [19c]
    parser_type: MULTI_TAG
    few_shot_assign_ids: [UHN00151, UHN00201, UHN00101, UHN00351, UHN00451]
    parser_data:
      options:
