  Q_22:
    prompt: >-
      In the snippet below, the interviewer is asking each patient whether they 
      worry about their health and, if so, what their biggest worry is. For each 
      patient, your task is to determine if the patient is worried and, if so, 
      what that worry is. Extract the categorize the most appropriate answer from 
      the following options. 
      
      
      Options:

      1. "YES: <worry>"

      Answer "YES: <worry>" if the patient mentions that they do worry about their
      health. Fill in "<worry>" a description of their biggest worry.
      
      
      Some common worries are:

      - body system (e.g., heart, kidneys, etc.)

      - family

      - function

      
      If the patient mentions any of these directly, use the corresponding key term as 
      your summary of the patient's response. For example, convert the snippet "I want 
      to go back to functioning normally" to "YES: function". For example, convert the 
      snippet "I'm worried about my kidneys" to "YES: kidneys". If the patient mentions 
      some other biggest worry, summarize that worry into a 1-3 word description.
      
      
      If patient mentions more than one worry, group these individual worries into
      a comma-separated list of worries. For example, convert the snippet "I'm 
      worried about my heart and my kidneys" to "YES: heart, kidneys".
      
      
      NOTE: If the patient mentions being worried but without specifying a clear
      worry, fill in "<worry>" with the special tag "UNSPECIFIED". For example,
      convert the snippet "Yes, I'm worried" to "YES: UNSPECIFIED", since the
      patient fails to specify which specific worry they have.

      
      2. "SOMEWHAT: <worry>"

      Answer "SOMEWHAT: <worry>" if the patient mentions that they are only somewhat
      worried about their health. This can include expressions such as "sure" or
      "I guess so". Fill in "<worry>" a description of their biggest worry.
      
      
      Some common worries are:

      - body system (e.g., heart, kidneys, etc.)

      - family

      - function

      
      If the patient mentions any of these directly, use the corresponding key term as 
      your summary of the patient's response. For example, convert the snippet "I'm a 
      little bit worried about my kidneys" to "SOMEWHAT: kidneys". If the patient
      mentions some other biggest worry, summarize it into a 1-3 word description.
      
      
      If patient mentions more than one worry, group these individual worries into
      a comma-separated list of worries. For example, convert the snippet "I'm a little
      bit worried about my heart and my kidneys" to "SOMEWHAT: heart, kidneys".
      
      
      NOTE: If the patient mentions being worried but without specifying a clear
      worry, fill in "<worry>" with the special tag "UNSPECIFIED". For example,
      convert the snippet "I'm a little worried" to "SOMEWHAT: UNSPECIFIED",
      since the patient fails to specify which specific worry they have.


      3. "NO"

      Answer with "NO" if the patient expresses that they do *not* worry about
      their health.


      4. "IRRELEVANT"

      Answer with "IRRELEVANT" if the patient fails to answer the interviewer's 
      question because they are talking about something other than whether or
      not they worry about their health and, if so, what their biggest worry is.
      
      
      Additional instructions:
      
      Answer with the most appropriate of the options listed above according to
      the format specified above. Do not output anything else.
    question_ids: ["22", "22a"]
    parser_type: MULTI_TAG
    few_shot_assign_ids: [UHN00101, UHN00151, UHN00301, UHN00351, UHN00451]
    parser_data:
      options:
        - {tag: "YES", repeatable: false, value_sep: ":"}
        - {tag: "SOMEWHAT", repeatable: false, value_sep: ":"}
        - {tag: "NO", repeatable: false, value_sep: null}
        - {tag: "IRRELEVANT", repeatable: false, value_sep: null}
